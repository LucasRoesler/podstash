{{define "title"}}Add Podcast — podstash{{end}}

{{define "content"}}
<h1>Add Podcast</h1>

{{if .Error}}
<div role="alert" data-variant="error">
  <div>{{.Error}}</div>
</div>
{{end}}
{{if .Success}}
<div role="alert" data-variant="success">
  <div>{{.Success}}</div>
</div>
{{end}}

<div class="row">
  <div class="col col-6">
    <div class="card">
      <h2>Add by RSS URL</h2>
      <form method="POST" action="/podcasts">
        <fieldset data-field>
          <label for="url">Feed URL</label>
          <input type="url" id="url" name="url" placeholder="https://example.com/feed.xml" required>
        </fieldset>
        <button type="submit">Add Podcast</button>
      </form>
    </div>
  </div>

  <div class="col col-6">
    <div class="card">
      <h2>Import OPML</h2>
      <form method="POST" action="/opml" enctype="multipart/form-data">
        <fieldset data-field>
          <label for="opml">OPML File</label>
          <input type="file" id="opml" name="opml" accept=".opml,.xml" required>
        </fieldset>
        <button type="submit">Import</button>
      </form>
    </div>
  </div>
</div>
{{end}}
